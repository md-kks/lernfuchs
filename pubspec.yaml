name: lernfuchs
description: "LernFuchs — Grundschul-Lernapp für Mathe & Deutsch (Klasse 1–4)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Lokale Persistenz (Phase 1: JSON via shared_preferences)
  shared_preferences: ^2.5.3

  # Text-to-Speech (Phase 4)
  flutter_tts: ^4.2.0
  audioplayers: ^6.0.0

  cupertino_icons: ^1.0.8
  flame: ^1.37.0
  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/dialogue/
    - assets/images/
    - assets/quests/
    - assets/quests/daily_task_narratives.json
    - assets/quests/expedition_stories.json

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
